<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#142866"/>
      <stop offset="100%" style="stop-color:#4a7cf5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Phone icon (digital) -->
  <g transform="translate(300, 100)" opacity="0.2">
    <rect x="0" y="0" width="100" height="180" rx="16" fill="none" stroke="white" stroke-width="4"/>
    <rect x="10" y="20" width="80" height="120" rx="4" fill="white" opacity="0.3"/>
    <circle cx="50" cy="160" r="8" fill="none" stroke="white" stroke-width="3"/>
  </g>
  <!-- VS -->
  <g transform="translate(540, 150)" opacity="0.25">
    <circle cx="60" cy="60" r="50" fill="white" opacity="0.2"/>
    <text x="60" y="75" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle">VS</text>
  </g>
  <!-- Notebook icon (paper) -->
  <g transform="translate(750, 100)" opacity="0.2">
    <rect x="0" y="0" width="140" height="180" rx="8" fill="none" stroke="white" stroke-width="4"/>
    <line x1="30" y1="0" x2="30" y2="180" stroke="white" stroke-width="2"/>
    <line x1="50" y1="40" x2="120" y2="40" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="65" x2="110" y2="65" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="90" x2="120" y2="90" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="50" y1="115" x2="95" y2="115" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="600" y="420" font-family="Inter, -apple-system, sans-serif" font-size="50" font-weight="700" fill="white" text-anchor="middle">Digital vs Paper Sermon Notes</text>
  <text x="600" y="480" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="400" fill="white" opacity="0.8" text-anchor="middle">An Honest Comparison to Help You Decide</text>
  <text x="600" y="580" font-family="Inter, -apple-system, sans-serif" font-size="18" font-weight="500" fill="white" opacity="0.5" text-anchor="middle">sermonkeeper.app</text>
</svg>
